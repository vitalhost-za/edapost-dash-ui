# /etc/nginx/sites-available/edapost-api
# ln -s /etc/nginx/sites-available/edapost-api /etc/nginx/sites-enabled/

upstream edapost_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Rate limiting zone: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name api.edapost.net;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.edapost.net;

    # TLS — use the same Let's Encrypt cert or a separate one
    ssl_certificate /etc/letsencrypt/live/mail.edapost.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.edapost.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Request size limit (10MB for batch + attachments)
    client_max_body_size 10m;

    # Health check — no rate limit
    location /health {
        proxy_pass http://edapost_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API routes — rate limited
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://edapost_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Block everything else
    location / {
        return 404;
    }
}
